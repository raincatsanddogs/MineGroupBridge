<html>
<head>
<style>
  body {
    margin: 0;
    padding: 0;
    background-color: transparent;
    font-family: 'Minecraft Font', 'Minecraft_Font', sans-serif;
  }

  /* 核心容器 */
  .toast-container {
    display: inline-block;
    width: 1980px;
    font-size: 0;
    vertical-align: middle;
  }

  /* 像素角边缘行 */
  .p-row {
    display: block;
    height: 8px;
    box-sizing: border-box;
  }

  .p-row-1 {
    margin: 0 16px;
    background-color: #000000;
  }

  .p-row-2 {
    margin: 0 8px;
    background-color: #4a4a4a;
    border-left: 8px solid #000000;
    border-right: 8px solid #000000;
  }

  /* 像素主体包装器，用于提供两边的黑色边框 */
  .p-body-wrapper {
    display: block;
    width: 1980px;
    box-sizing: border-box;
    border-left: 8px solid #000000;
    border-right: 8px solid #000000;
  }

  /* 像素主体 */
  .p-body {
    display: block;
    width: 1964px;
    background-color: #212121;
    border-left: 16px solid #4a4a4a;
    border-right: 16px solid #4a4a4a;
    border-top: 8px solid #4a4a4a;
    border-bottom: 8px solid #4a4a4a;
    box-sizing: border-box;
    padding: 48px 56px;
  }

  .toast-icon {
    display: inline-block;
    vertical-align: middle;
    width: 256px;
    height: 256px;
  }

  .toast-icon img {
    width: 256px;
    height: 256px;
    image-rendering: pixelated;
    display: block;
  }

  .toast-content {
    display: inline-block;
    vertical-align: middle;
    margin-left: 32px;
    width: 1532px;                    /* 1980px总宽 - 24px*2边框 - 56px*2内边距 - 256px图标 - 32px内容间距 = 1532px */
    box-sizing: border-box;
  }

  .toast-title {
    font-size: 96px;
    font-weight: bold;
    margin-bottom: 24px;
    line-height: 1;
  }

  /* 进度 (task): 黄色字 */
  .toast-title,
  .toast-title.task {
    color: #ffff55;
  }

  /* 目标 (goal): 天蓝色字 */
  .toast-title.goal {
    color: #55ffff;
  }

  /* 挑战 (challenge): 紫色字 */
  .toast-title.challenge {
    color: #aa00aa;
  }

  .toast-desc {
    color: #ffffff;
    font-size: 86px;
    line-height: 1;
  }
</style>
</head>
<body>

<div class="toast-container">
  <div class="p-row p-row-1"></div>
  <div class="p-row p-row-2"></div>
  <div class="p-body-wrapper">
    <div class="p-body">
      <div class="toast-icon">
        <img src="{{png_path | default('https://raw.githubusercontent.com/Owen1212055/mc-assets/main/item-assets/BARRIER.png')}}" alt="Achievement Icon">
      </div><div class="toast-content"> 
        <div class="toast-title {{ achi_type | default('task') }}">{{ title | default('测试文字') }}</div>
        <div class="toast-desc">{{ description | default('测试描述') }}</div>
      </div>
    </div>
  </div>
  <div class="p-row p-row-2"></div>
  <div class="p-row p-row-1"></div>
</div>

</body>
</html>
